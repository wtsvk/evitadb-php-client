name: Publish to Packagist

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.event.head_commit.message, 'Bump EvitaDB to')
    env:
      PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "create=false" >> "$GITHUB_OUTPUT"
          else
            LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            LAST=${LAST:-v0.0.0}
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
            MINOR=$((MINOR + 1)); PATCH=0
            echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
            echo "create=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create + push tag
        if: steps.tag.outputs.create == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Notify Packagist
        if: vars.PACKAGIST_USER && env.PACKAGIST_TOKEN != ''
        run: |
          curl -sfX POST -H 'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${{ vars.PACKAGIST_USER }}&apiToken=$PACKAGIST_TOKEN" \
            -d '{"repository":{"url":"https://github.com/wtsvk/evitadb-php-client"}}'
